<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Battery Status</title>
</head>
<body>
<p id="level">Battery Level:</p>
<p id="status">Battery Status:</p>
<script>
  const batteryLevel = document.getElementById('level');
  const batteryStatus = document.getElementById('status');
  navigator.getBattery().then(function(battery) {
    // Function to log battery status
    function updateBatteryStatus() {
      batteryLevel.textContent = `Battery level: ${battery.level * 100}%`;
      console.log(`Battery level: ${battery.level * 100}%`);
      batteryStatus.textContent = `Charging status: ${battery.charging ? "Charging" : "Not charging"}`
      console.log(`Charging status: ${battery.charging ? "Charging" : "Not charging"}`);
    }

    // Log initial battery status
    updateBatteryStatus();

    // Event handler for battery level change
    battery.addEventListener('levelchange', function() {
      console.log('Battery level changed.');
      updateBatteryStatus();
    });

    // Event handler for charging status change
    battery.addEventListener('chargingchange', function() {
      console.log('Charging status changed.');
      updateBatteryStatus();
    });
  });
</script>
</body>
</html>
