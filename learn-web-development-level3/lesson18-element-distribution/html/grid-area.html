<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid-area</title>
    <link rel="stylesheet" href="../styles/grid-area.css">
</head>
<body>
<h1>Grid Area</h1>
<h2>1. The grid-template-areas Property</h2>
<div class="container">
    <h3>Example of Using grid-template-areas</h3>
    <div class="grid-container1">
        <div class="header1">Header</div>
        <div class="sidebar1">Sidebar</div>
        <div class="main1">Main Content</div>
        <div class="footer1">Footer</div>
    </div>
</div>
<h2>2. Managing Empty Areas</h2>
<div class="container">
    <h2>Example with Empty Areas</h2>
    <div class="grid-container2">
        <div class="header2">Header</div>
        <div class="main2">Main Content</div>
        <div class="footer2">Footer</div>
    </div>
</div>
</body>
</html>
