<!DOCTYPE html>
<html lang="en">
<head>

    <title>animation-basics</title>
    <link rel="stylesheet" href="../styles/animation-basics.css">
</head>
<body>
<h1>Animation Basics</h1>
<h2>1. The @keyframes Rule</h2>
<div class="container">
    <div class="animated-box1">Hover over me!</div>
</div>
<h2>2. Multiple Keyframes</h2>
<div class="container">
    <h3>Example: Diagonal Movement with Color Change</h3>
    <div class="animated-box2">Watch me move!</div>
</div>

<div class="container">
    <h3>Example 1: Pulsing Effect</h3>
    <div class="pulse-box">Pulsing</div>
</div>
<br>
<div class="container">
    <h3>Example 2: Rotation</h3>
    <div class="rotate-box">Rotating</div>
</div>
