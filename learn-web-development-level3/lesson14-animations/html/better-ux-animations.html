<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>better-ux-animations</title>
    <link rel="stylesheet" href="../styles/better-ux-animations.css">
</head>
<body>
<h1>Better Animations for UX</h1>
<h2>1. Hover Effects</h2>
<div class="container">
    <h3>Example: Button Hover Animation</h3>
    <button class="button">Hover me</button>
</div>
<h2>2. Loading Animations</h2>
<div class="container">
    <h3>Example: Loading Spinner</h3>
    <div class="spinner"></div>
</div>
<h2>3. Page Transition Animations</h2>
<div class="container">
    <h3>Example: Page Transition</h3>
    <div class="page">Content of the page</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('.page').classList.add('active');
        });
    </script>
</div>
<h3>4. Click Animations</h3>
<div class="container">
    <h3>Example: Button Click Animation</h3>
    <button class="button2">Click me</button>
</div>
</body>
</html>
