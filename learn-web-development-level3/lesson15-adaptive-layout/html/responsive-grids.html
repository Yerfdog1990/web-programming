<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>responsive-grids</title>
  <link rel="stylesheet" href="../styles/responsive-grids.css">
</head>
<body>
<h1>Responsive Grids</h1>
<h2>1 Flexbox</h2>
<div class="container">
  <h3>Example: Responsive Three Columns</h3>
  <div class="flex-container">
    <div class="flex-item">Column 1</div>
    <div class="flex-item">Column 2</div>
    <div class="flex-item">Column 3</div>
  </div>
</div>
<h2>2. CSS Grid</h2>
<div class="container">
  <h3>Example: 3 Columns × 2 Rows</h3>
  <div class="grid-container">
    <div class="grid-item">Item 1</div>
    <div class="grid-item">Item 2</div>
    <div class="grid-item">Item 3</div>
    <div class="grid-item">Item 4</div>
    <div class="grid-item">Item 5</div>
    <div class="grid-item">Item 6</div>
  </div>
</div>
</body>
</html>
