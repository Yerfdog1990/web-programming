<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>units-of-measurement</title>
  <link rel="stylesheet" href="../styles/units-of-measurement.css">
</head>
<body>
<h1>Units of Measurement</h1>
<h2>1. Percentage Values (%)</h2>
<div class="container">
  <div class="percentage-container">
    <div class="percentage-box">Content</div>
  </div>
</div>
<h2>2. Relative Units: em and rem</h2>
<div class="container">
  <h3>Example: Using em</h3>
  <div class="em-parent">
    <div class="em-child">Content</div>
  </div>
</div>
<br>
<div class="container">
  <h3>Example: Using rem</h3>
  <div class="rem-container">
    <div class="rem-box">Content</div>
  </div>
</div>
</body>
</html>
