<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>transformation-center</title>
    <link rel="stylesheet" href="../styles/transformation-center.css">
</head>
<body>
<h1>Transformation Center</h1>
<h2>Centering the Origin Point (Default Behavior)</h2>
<div class="container">
    <div class="origin-point-box"></div>
</div>
<h2>2. Origin at Top Left Corner</h2>
<div class="container">
    <div class="left-corner-box"></div>
</div>
<h2>3. Origin at Bottom Right Corner</h2>
<div class="container">
    <div class="right-corner-box"></div>
</div>
<h2>4. Using Percentage Values</h2>
<div class="container">
    <div class="percentage-box"></div>
</div>
<h2>5. Using Absolute Values</h2>
<div class="container">
    <div class="absolute-box"></div>
</div>
<h2>6. Practical Use</h2>
<div class="container" style="height: 300px;">
    <div class="clock">
        <div class="hand hour-hand"></div>
    </div>
</div>
<h3>Creating a Scalable Element</h3>
<div class="container">
    <div class="scalable-box"></div>
</div>
</body>
</html>
