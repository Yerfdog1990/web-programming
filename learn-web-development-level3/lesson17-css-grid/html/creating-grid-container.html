<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>creating-grid-container</title>
    <link rel="stylesheet" href="../styles/creating-grid-container.css">
</head>
<body>
<h1>Creating a Grid Container</h1>
<h2>1. Example: Basic Grid Container</h2>
<div class="container">
    <div class="grid-container">
        <div class="grid-item">Item 1</div>
        <div class="grid-item">Item 2</div>
        <div class="grid-item">Item 3</div>
    </div>
</div>
<h2>2. Nested Grid Containers</h2>
<div class="container">
    <div class="grid-container">
        <div class="grid-item">Item 1</div>
        <div class="grid-item">
            <div class="nested-grid-container">
                <div class="nested-grid-item">Nested Item 1</div>
                <div class="nested-grid-item">Nested Item 2</div>
            </div>
        </div>
        <div class="grid-item">Item 3</div>
    </div>
</div>
<h2>3. Managing Grid Container Behavior</h2>
<div class="container">
    <div class="managing-grid-container">
        <div class="managing-grid-item">Item 1</div>
        <div class="managing-grid-item">Item 2</div>
        <div class="managing-grid-item">Item 3</div>
    </div>
</div>
<h2>4. Using Flexbox Inside a Grid Container</h2>
<div class="container">
    <div class="inside-grid-container">
        <div class="inside-grid-item inside-flex-container">
            <div class="inside-flex-item">Flex Item 1</div>
            <div class="inside-grid-item">Flex Item 2</div>
        </div>
        <div class="inside-grid-item">Item 2</div>
        <div class="inside-grid-item">Item 3</div>
    </div>
</div>
</body>
</html>
