<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions min(), max(), and clamp()</title>
    <link rel="stylesheet" href="../styles/min()-max()-clamp()-functions.css">
</head>

<body>

<h1>Functions min(), max(), and clamp()</h1>

<div class="container">

    <div class="box">
        Width: clamp(200px, 50%, 600px)
    </div>

    <p class="text">
        Font size: clamp(1em, 2vw, 2em)
    </p>

    <div class="sidebar">
        Width: max(200px, 30%)
    </div>

    <p class="text-small">
        Font size: min(2em, 5vw)
    </p>

</div>

</body>
</html>
