<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Functions Usage Example</title>
    <link rel="stylesheet" href="../styles/introduction.css">
</head>

<body>

<div class="container">

    <div class="block">
        Block with width calc(50% - 20px)
    </div>

    <div class="block">
        Block with width min(300px, 100%)
    </div>

    <div class="block">
        Block with width max(200px, 50%)
    </div>

    <p class="text">
        Text with font size clamp(12px, 2vw, 24px)
    </p>

</div>

</body>
</html>
